# .cnb.yml
main:
  push:
    - stages:
        - name: sync to github
          imports: https://cnb.cool/1oved/secrets/-/blob/main/sync-env.yml
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/omnimind-ai/OpenOmniBot.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            
  pull_request:
    - name: verify
      imports: https://cnb.cool/o.k/secrets/-/blob/main/omnibot-release.yml
      docker:
        image: ubuntu:latest
      env:
        JAVA_VERSION: '17'
        FLUTTER_VERSION: '3.38.7'
        NDK_VERSION: '28.2.13676358'
        ALLOWED_THIRD_PARTY_WRAPPER_SHA: 'ee3739525a995bcb5601621a6e2daec1f183bbefc375743acc235cec33547e04'
        MNN_NATIVE_CACHE_VERSION: '2026-04-03-1'
      stages:
        # 检出代码库
        - name: Checkout repository
          jobs:
            - name: checkout
              script: |
                apt-get update && apt-get install -y git
                git clone --depth=1 --recursive https://${CNB_TOKEN}@${CNB_REPO_URL_HTTPS#https://} .
                git fetch --depth=0 origin ${CNB_BRANCH}
                git checkout ${CNB_COMMIT}

        # 密钥扫描
        - name: Secret scan (gitleaks)
          jobs:
            - name: gitleaks-scan
              script: |
                apt-get update && apt-get install -y wget tar
                wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
                tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
                chmod +x gitleaks
                ./gitleaks detect --source=. --verbose --redact
              env:
                GITHUB_TOKEN: ${CNB_TOKEN}
                GITLEAKS_LICENSE: ${SECRETS_GITLEAKS_LICENSE}

        # 设置JDK 17
        - name: Set up JDK 17
          jobs:
            - name: setup-java
              script: |
                apt-get update && apt-get install -y wget apt-transport-https gnupg software-properties-common
                wget -O - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | tee /usr/share/keyrings/adoptium.gpg
                echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/adoptium.list
                apt-get update && apt-get install -y temurin-17-jdk
                echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
                echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

        # 验证Gradle包装器
        - name: Validate Gradle wrappers
          jobs:
            - name: gradle-wrapper-validation
              script: |
                wget https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
                chmod +x gradlew
                ./gradlew --version
                echo "${ALLOWED_THIRD_PARTY_WRAPPER_SHA}  gradlew" | sha256sum -c

        # 设置Gradle
        - name: Set up Gradle
          jobs:
            - name: setup-gradle
              script: |
                wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
                unzip gradle-8.5-bin.zip
                mv gradle-8.5 /opt/gradle
                echo "PATH=/opt/gradle/bin:$PATH" >> $GITHUB_ENV

        # 设置Flutter
        - name: Set up Flutter
          jobs:
            - name: setup-flutter
              script: |
                apt-get update && apt-get install -y curl unzip
                wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
                tar xf flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
                mv flutter /opt/flutter
                echo "PATH=/opt/flutter/bin:$PATH" >> $GITHUB_ENV
                flutter config --enable-web --enable-linux-desktop
                flutter doctor

        # 设置Android SDK
        - name: Set up Android SDK
          jobs:
            - name: setup-android-sdk
              script: |
                apt-get update && apt-get install -y wget unzip
                wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
                mkdir -p /opt/android-sdk/cmdline-tools
                unzip commandlinetools-linux-9477386_latest.zip -d /opt/android-sdk/cmdline-tools/
                mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
                echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
                echo "PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools" >> $GITHUB_ENV
                yes | sdkmanager --licenses

        # 缓存Android NDK
        - name: Cache Android NDK
          jobs:
            - name: cache-android-ndk
              script: |
                echo "Cache path: ${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
                echo "Cache key: ${RUNNER_OS}-android-ndk-${NDK_VERSION}"
                # 模拟缓存检查逻辑
                if [ -d "${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" ] && [ -d "${ANDROID_SDK_ROOT}/licenses" ]; then
                  echo "cache-hit=true" > cache-status.txt
                else
                  echo "cache-hit=false" > cache-status.txt
                fi
              exports:
                cache-hit: CACHE_HIT_STATUS

        # 安装Android NDK（条件执行）
        - name: Install Android NDK
          if: ${CACHE_HIT_STATUS} != "true"
          jobs:
            - name: install-ndk
              script: |
                yes | sdkmanager --licenses >/dev/null
                sdkmanager "ndk;${NDK_VERSION}"

        # 导出Android NDK环境变量
        - name: Export Android NDK environment
          jobs:
            - name: export-ndk-env
              script: |
                echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
                echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV

        # 缓存MNN原生库
        - name: Cache prepared MNN native libraries
          jobs:
            - name: cache-mnn-libs
              script: |
                CACHE_PATHS="third_party/mnn_android/project/android/build_64/lib third_party/mnn_android/schema/current"
                CACHE_KEY="${RUNNER_OS}-mnn-native-${NDK_VERSION}-${MNN_NATIVE_CACHE_VERSION}-$(find scripts/prepare_mnn_android_native.sh third_party/mnn_android/project/android/build_64.sh -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)"
                echo "Cache paths: $CACHE_PATHS"
                echo "Cache key: $CACHE_KEY"

        # 安装Flutter依赖
        - name: Install Flutter dependencies
          jobs:
            - name: flutter-deps
              script: |
                cd ui
                flutter pub get --enforce-lockfile

        # Flutter代码分析
        - name: Flutter analyze
          jobs:
            - name: flutter-analyze
              script: |
                cd ui
                flutter analyze --no-fatal-warnings --no-fatal-infos

        # Gradle验证任务
        - name: Gradle verify develop debug
          jobs:
            - name: gradle-verify
              script: |
                ./gradlew --no-daemon --parallel --build-cache \
                  :app:testDevelopDebugUnitTest \
                  :app:assembleDevelopDebug \
                  :app:lintDevelopDebug

# .cnb.yml
v*:
  tag_push:
    - name: build
      imports: https://cnb.cool/o.k/secrets/-/blob/main/omnibot-release.yml
      docker:
        image: ubuntu:latest
      env:
        JAVA_VERSION: '17'
        FLUTTER_VERSION: '3.38.7'
        NDK_VERSION: '28.2.13676358'
        ALLOWED_THIRD_PARTY_WRAPPER_SHA: 'ee3739525a995bcb5601621a6e2daec1f183bbefc375743acc235cec33547e04'
        MNN_NATIVE_CACHE_VERSION: '2026-04-03-1'
        # 密钥将通过CNB密钥仓库管理
        RELEASE_KEYSTORE: ${SECRETS_RELEASE_KEYSTORE}
        RELEASE_PASSWORD: ${SECRETS_RELEASE_PASSWORD}
        RELEASE_KEY_ALIAS: ${SECRETS_RELEASE_KEY_ALIAS}
      stages:
        # 检出代码库（递归子模块）
        - name: Checkout repository
          jobs:
            - name: checkout
              script: |
                apt-get update && apt-get install -y git
                git clone --depth=1 --recursive https://${CNB_TOKEN}@${CNB_REPO_URL_HTTPS#https://} .
                git fetch --depth=0 origin ${CNB_BRANCH}
                git checkout ${CNB_COMMIT}

        # 设置JDK 17
        - name: Set up JDK 17
          jobs:
            - name: setup-java
              script: |
                apt-get update && apt-get install -y wget apt-transport-https gnupg software-properties-common
                wget -O - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | tee /usr/share/keyrings/adoptium.gpg
                echo "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/adoptium.list
                apt-get update && apt-get install -y temurin-17-jdk
                echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
                echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

        # 验证Gradle包装器
        - name: Validate Gradle wrappers
          jobs:
            - name: gradle-wrapper-validation
              script: |
                wget https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
                chmod +x gradlew
                ./gradlew --version
                echo "${ALLOWED_THIRD_PARTY_WRAPPER_SHA}  gradlew" | sha256sum -c

        # 设置Gradle
        - name: Set up Gradle
          jobs:
            - name: setup-gradle
              script: |
                wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
                unzip gradle-8.5-bin.zip
                mv gradle-8.5 /opt/gradle
                echo "PATH=/opt/gradle/bin:$PATH" >> $GITHUB_ENV

        # 设置Flutter
        - name: Set up Flutter
          jobs:
            - name: setup-flutter
              script: |
                apt-get update && apt-get install -y curl unzip
                wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
                tar xf flutter_linux_${FLUTTER_VERSION}-stable.tar.xz
                mv flutter /opt/flutter
                echo "PATH=/opt/flutter/bin:$PATH" >> $GITHUB_ENV
                flutter config --enable-web --enable-linux-desktop
                flutter doctor

        # 设置Android SDK
        - name: Set up Android SDK
          jobs:
            - name: setup-android-sdk
              script: |
                apt-get update && apt-get install -y wget unzip
                wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
                mkdir -p /opt/android-sdk/cmdline-tools
                unzip commandlinetools-linux-9477386_latest.zip -d /opt/android-sdk/cmdline-tools/
                mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
                echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
                echo "PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools" >> $GITHUB_ENV
                yes | sdkmanager --licenses

        # 缓存Android NDK
        - name: Cache Android NDK
          jobs:
            - name: cache-android-ndk
              script: |
                echo "Cache path: ${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
                echo "Cache key: ${RUNNER_OS}-android-ndk-${NDK_VERSION}"
                # 模拟缓存检查逻辑
                if [ -d "${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" ] && [ -d "${ANDROID_SDK_ROOT}/licenses" ]; then
                  echo "cache-hit=true" > cache-status.txt
                else
                  echo "cache-hit=false" > cache-status.txt
                fi
              exports:
                cache-hit: CACHE_HIT_STATUS

        # 安装Android NDK（条件执行）
        - name: Install Android NDK
          if: ${CACHE_HIT_STATUS} != "true"
          jobs:
            - name: install-ndk
              script: |
                yes | sdkmanager --licenses >/dev/null
                sdkmanager "ndk;${NDK_VERSION}"

        # 导出Android NDK环境变量
        - name: Export Android NDK environment
          jobs:
            - name: export-ndk-env
              script: |
                echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV
                echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> $GITHUB_ENV

        # 缓存MNN原生库
        - name: Cache prepared MNN native libraries
          jobs:
            - name: cache-mnn-libs
              script: |
                CACHE_PATHS="third_party/mnn_android/project/android/build_64/lib third_party/mnn_android/schema/current"
                CACHE_KEY="${RUNNER_OS}-mnn-native-${NDK_VERSION}-${MNN_NATIVE_CACHE_VERSION}-$(find scripts/prepare_mnn_android_native.sh third_party/mnn_android/project/android/build_64.sh -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)"
                echo "Cache paths: $CACHE_PATHS"
                echo "Cache key: $CACHE_KEY"

        # 安装Flutter依赖
        - name: Install Flutter dependencies
          jobs:
            - name: flutter-deps
              script: |
                cd ui
                flutter pub get --enforce-lockfile

        # 解码发布密钥库
        - name: Decode release keystore
          jobs:
            - name: decode-keystore
              script: |
                echo "${RELEASE_KEYSTORE}" | base64 -d > ${RUNNER_TEMP}/release.jks

        # 构建生产版本APK
        - name: Build production release APK
          jobs:
            - name: build-apk
              env:
                GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED"
              script: |
                CPU_COUNT=$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 4)
                if [ "$CPU_COUNT" -ge 4 ]; then
                  MAX_WORKERS=4
                elif [ "$CPU_COUNT" -ge 2 ]; then
                  MAX_WORKERS="$CPU_COUNT"
                else
                  MAX_WORKERS=2
                fi
                echo "Using Gradle max workers: ${MAX_WORKERS}"
                ./gradlew --no-daemon --parallel --build-cache --max-workers="${MAX_WORKERS}" assembleProductionRelease \
                  -POMNI_RELEASE_STORE_FILE=${RUNNER_TEMP}/release.jks \
                  -POMNI_RELEASE_STORE_PWD=${RELEASE_PASSWORD} \
                  -POMNI_RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS} \
                  -POMNI_RELEASE_KEY_PWD=${RELEASE_PASSWORD}

        # 生成SHA256校验和
        - name: Generate SHA256 checksum
          jobs:
            - name: generate-checksum
              script: |
                sha256sum app/build/outputs/apk/production/release/app-production-release.apk \
                  > app/build/outputs/apk/production/release/app-production-release.apk.sha256

        # 重命名发布产物
        - name: Rename release artifacts
          jobs:
            - name: rename-artifacts
              script: |
                RELEASE_DIR="app/build/outputs/apk/production/release"
                RELEASE_APK_NAME="OpenOmniBot-${CNB_BRANCH}.apk"
                mv "${RELEASE_DIR}/app-production-release.apk" "${RELEASE_DIR}/${RELEASE_APK_NAME}"
                mv "${RELEASE_DIR}/app-production-release.apk.sha256" "${RELEASE_DIR}/${RELEASE_APK_NAME}.sha256"
                echo "RELEASE_APK_NAME=${RELEASE_APK_NAME}" >> $GITHUB_ENV
              exports:
                RELEASE_APK_NAME: RELEASE_APK_NAME

        # 上传发布产物（模拟）
        - name: Upload release artifacts
          jobs:
            - name: upload-artifacts
              script: |
                echo "Artifacts would be uploaded here:"
                echo "  - ${RELEASE_APK_NAME}"
                echo "  - ${RELEASE_APK_NAME}.sha256"
                # 实际使用时可替换为CNB的上传插件或存储操作

        # 创建草稿GitHub Release（模拟）
        - name: Create Draft GitHub Release
          jobs:
            - name: create-release
              script: |
                echo "Creating draft release for tag: ${CNB_BRANCH}"
                echo "Release notes would be generated automatically"
                echo "Files included:"
                echo "  - ${RELEASE_APK_NAME}"
                echo "  - ${RELEASE_APK_NAME}.sha256"
                # 实际使用时可调用GitHub API创建Release

$:
  vscode:
    - docker:
        image: docker.cnb.cool/o.k/dev-env-next-kotlin
      services:
        - vscode
        - docker
      # 开发环境启动后会执行的任务
      stages:
        - name: setup anthropic env
          imports: 
            - https://cnb.cool/o.k/secrets/-/blob/main/claude.yml
            - https://cnb.cool/o.k/secrets/-/blob/main/codex.yml
          script: |
            # 创建 .claude 目录
            mkdir -p .claude
            mkdir -p ~/.codex
            cat > ~/.claude.json << EOF
            {
              "hasCompletedOnboarding": true
            }
            EOF
            # 创建 settings.json 文件
            cat > .claude/settings.json << EOF
            {
              "env": {
                "ANTHROPIC_AUTH_TOKEN": "${ANTHROPIC_AUTH_TOKEN}",
                "ANTHROPIC_BASE_URL": "${ANTHROPIC_BASE_URL}",
                "API_TIMEOUT_MS": "3000000",
                "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": 1
              },
              "alwaysThinkingEnabled": true
            }
            EOF
            echo ".claude/settings.json"
            cat > ~/.codex/config.toml << EOF
            model_provider = "octopus"
            model = "gpt-5.3-codex"
            model_reasoning_effort = "high"
            disable_response_storage = true
            [model_providers.octopus]
            name = "octopus"
            base_url = "${OPENAI_BASE_URL}"
            wire_api = "responses"
            requires_openai_auth = true
            EOF
            cat > ~/.codex/auth.json << EOF
            {
              "OPENAI_API_KEY": "${OPENAI_API_KEY}"
            }
            EOF
        - name: ls
          script: ls -al