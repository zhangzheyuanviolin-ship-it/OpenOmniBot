name: ui
description: "A new Flutter module project."

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
#
# This version is used _only_ for the Runner app, which is used if you just do
# a `flutter run`. It has no impact on any other native host app that you embed
# your Flutter project into.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  loading_animation_widget: ^1.2.1
  flutter_markdown: ^0.7.7
  carousel_slider: ^5.1.1
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  flutter_slidable: ^4.0.3
  flutter_switch: ^0.3.2
  simple_gradient_text: ^1.3.0
  dotted_border: ^3.1.0
  gradient_borders: ^1.0.2


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  webview_flutter: ^4.4.2
  fluttertoast: ^8.2.4
  go_router: ^14.2.7
  flutter_svg: ^2.0.10+1
  gal: ^1.0.0
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  path_provider: ^2.1.5
  file_picker: ^8.1.2
  just_audio: ^0.10.5
  archive: ^4.0.9
  markdown: ^7.3.0
  flutter_math_fork: ^0.7.3
  video_player: ^2.10.0
  xml: ^6.6.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.11

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.33
  image_picker_android: 0.8.13+14
  path_provider_android: 2.2.22
  shared_preferences_android: 2.4.21
  url_launcher_android: 6.3.28
  video_player_android: 2.9.4
  webview_flutter_android: 4.10.13

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  generate: true
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add Flutter specific assets to your application, add an assets section,
  # like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/images/
    - assets/avatar/
    - assets/home/
    - assets/home/spring_festival/
    - assets/welcome/
    - assets/common/
    - assets/memory/
    - assets/my/
    - assets/app_icons/
    - assets/webview/
    - assets/feedback/
    - assets/loading/
    - assets/course/
    - assets/chatbot/
    - assets/chatbot/meituan-order-drinks/
    - assets/execution_history/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add Flutter specific custom fonts to your application, add a fonts
  # section here, in this "flutter" section. Each entry in this list should
  # have a "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package


  # This section identifies your Flutter project as a module meant for
  # embedding in a native host app.  These identifiers should _not_ ordinarily
  # be changed after generation - they are used to ensure that the tooling can
  # maintain consistency when adding or modifying assets and plugins.
  # They also do not have any bearing on your native host application's
  # identifiers, which may be completely independent or the same as these.
  module:
    androidX: true
    androidPackage: com.example.ui
    iosBundleIdentifier: com.example.flutterModule
