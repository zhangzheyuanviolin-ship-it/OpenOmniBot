name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.38.7'
  NDK_VERSION: '28.2.13676358'
  ALLOWED_THIRD_PARTY_WRAPPER_SHA: 'ee3739525a995bcb5601621a6e2daec1f183bbefc375743acc235cec33547e04'
  MNN_NATIVE_CACHE_VERSION: '2026-04-03-1'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          allow-checksums: ${{ env.ALLOWED_THIRD_PARTY_WRAPPER_SHA }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: cache-android-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-android-ndk-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.cache-android-ndk.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Export Android NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Cache prepared MNN native libraries
        uses: actions/cache@v4
        with:
          path: |
            third_party/mnn_android/project/android/build_64/lib
            third_party/mnn_android/schema/current
          key: >-
            ${{ runner.os }}-mnn-native-${{ env.NDK_VERSION }}-${{ env.MNN_NATIVE_CACHE_VERSION }}-${{
            hashFiles('scripts/prepare_mnn_android_native.sh', 'third_party/mnn_android/project/android/build_64.sh') }}

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get --enforce-lockfile

      - name: Flutter analyze
        working-directory: ui
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Gradle verify develop debug
        run: >-
          ./gradlew --no-daemon --parallel --build-cache
          :app:testDevelopDebugUnitTest
          :app:assembleDevelopDebug
          :app:lintDevelopDebug
