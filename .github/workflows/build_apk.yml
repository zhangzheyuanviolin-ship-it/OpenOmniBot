name: Build Accessible APK

on:
  push:
    branches:
      - feat/accessibility
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.38.7'
  NDK_VERSION: '28.2.13676358'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Initialize required OmniInfer submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init third_party/omniinfer
          git -C third_party/omniinfer submodule update --init framework/mnn framework/llama.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: cache-android-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-android-ndk-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.cache-android-ndk.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Export Android NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Build Debug APK
        run: |
          ./gradlew --no-daemon --parallel --build-cache :app:assembleDevelopDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenOmniBot-Accessible-APK
          path: app/build/outputs/apk/develop/debug/*.apk
          retention-days: 30