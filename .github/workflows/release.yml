name: Release APK (Draft)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.7'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ runner.temp }}/release.jks

      - name: Build production release APK
        run: |
          ./gradlew assembleProductionRelease \
            -POMNI_RELEASE_STORE_FILE=${{ runner.temp }}/release.jks \
            -POMNI_RELEASE_STORE_PWD=${{ secrets.RELEASE_PASSWORD }} \
            -POMNI_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -POMNI_RELEASE_KEY_PWD=${{ secrets.RELEASE_PASSWORD }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum app/build/outputs/apk/production/release/app-production-release.apk \
            > app/build/outputs/apk/production/release/app-production-release.apk.sha256

      - name: Rename release artifacts
        run: |
          RELEASE_DIR="app/build/outputs/apk/production/release"
          RELEASE_APK_NAME="OpenOmniBot-${GITHUB_REF_NAME}.apk"
          mv "${RELEASE_DIR}/app-production-release.apk" "${RELEASE_DIR}/${RELEASE_APK_NAME}"
          mv "${RELEASE_DIR}/app-production-release.apk.sha256" "${RELEASE_DIR}/${RELEASE_APK_NAME}.sha256"
          echo "RELEASE_APK_NAME=${RELEASE_APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}.sha256

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}.sha256
