name: Release APK (Draft)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.38.7'
  NDK_VERSION: '28.2.13676358'
  ALLOWED_THIRD_PARTY_WRAPPER_SHA: 'ee3739525a995bcb5601621a6e2daec1f183bbefc375743acc235cec33547e04'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize required OmniInfer submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init third_party/omniinfer
          git -C third_party/omniinfer submodule update --init framework/mnn framework/llama.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          allow-checksums: ${{ env.ALLOWED_THIRD_PARTY_WRAPPER_SHA }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          validate-wrappers: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: cache-android-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-android-ndk-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.cache-android-ndk.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Export Android NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get --enforce-lockfile

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ runner.temp }}/release.jks

      - name: Build production release APK
        env:
          # Keep enough heap for R8 during release shrinking.
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED
        run: |
          CPU_COUNT="$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 4)"
          if [ "$CPU_COUNT" -ge 4 ]; then
            MAX_WORKERS=4
          elif [ "$CPU_COUNT" -ge 2 ]; then
            MAX_WORKERS="$CPU_COUNT"
          else
            MAX_WORKERS=2
          fi
          echo "Using Gradle max workers: ${MAX_WORKERS}"
          ./gradlew --no-daemon --build-cache --max-workers="${MAX_WORKERS}" assembleProductionRelease \
            -POMNI_RELEASE_STORE_FILE=${{ runner.temp }}/release.jks \
            -POMNI_RELEASE_STORE_PWD=${{ secrets.RELEASE_PASSWORD }} \
            -POMNI_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -POMNI_RELEASE_KEY_PWD=${{ secrets.RELEASE_PASSWORD }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum app/build/outputs/apk/production/release/app-production-release.apk \
            > app/build/outputs/apk/production/release/app-production-release.apk.sha256

      - name: Rename release artifacts
        run: |
          RELEASE_DIR="app/build/outputs/apk/production/release"
          SAFE_REF_NAME="$(printf '%s' "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')"
          RELEASE_APK_NAME="OpenOmniBot-${SAFE_REF_NAME}.apk"
          mv "${RELEASE_DIR}/app-production-release.apk" "${RELEASE_DIR}/${RELEASE_APK_NAME}"
          mv "${RELEASE_DIR}/app-production-release.apk.sha256" "${RELEASE_DIR}/${RELEASE_APK_NAME}.sha256"
          echo "SAFE_REF_NAME=${SAFE_REF_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_APK_NAME=${RELEASE_APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ env.SAFE_REF_NAME }}
          path: |
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}.sha256

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}
            app/build/outputs/apk/production/release/${{ env.RELEASE_APK_NAME }}.sha256
